<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Health Data Platform — Securely manage your smartwatch health data" />
    <title>{{block "title" .}}Health Data Platform{{end}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            color-scheme: dark;
            --bg:           #0a0f1e;
            --bg-mid:       #0d1630;
            --surface:      rgba(255, 255, 255, 0.04);
            --surface-hov:  rgba(255, 255, 255, 0.08);
            --border:       rgba(255, 255, 255, 0.09);
            --border-hov:   rgba(79, 142, 247, 0.4);
            --accent:       #4f8ef7;
            --accent-dark:  #3a75e0;
            --accent-glow:  rgba(79, 142, 247, 0.25);
            --text:         #e8eaf0;
            --text-muted:   #8892a4;
            --text-dim:     #555f72;
            --success:      #34d399;
            --success-bg:   rgba(52, 211, 153, 0.1);
            --warning:      #fbbf24;
            --warning-bg:   rgba(251, 191, 36, 0.1);
            --error:        #f87171;
            --error-bg:     rgba(248, 113, 113, 0.1);
            --radius:       12px;
            --radius-sm:    8px;
            --radius-lg:    16px;
            --shadow:       0 4px 24px rgba(0, 0, 0, 0.4);
            --shadow-glow:  0 0 40px rgba(79, 142, 247, 0.15);
        }

        html, body {
            height: 100%;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            outline: none;
        }

        input {
            font-family: inherit;
            outline: none;
        }

        /* ── Scrollbar ─────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* ── Toast container ───────────────────────── */
        #toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 9999;
        }

        .toast {
            padding: 12px 18px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            animation: toastIn 0.3s ease forwards;
            max-width: 320px;
        }

        .toast.success { background: var(--success-bg); color: var(--success); border-color: var(--success); }
        .toast.error   { background: var(--error-bg);   color: var(--error);   border-color: var(--error);   }
        .toast.warning { background: var(--warning-bg); color: var(--warning); border-color: var(--warning); }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(8px); }
        }
    </style>
    {{block "head" .}}{{end}}
</head>
<body>
    {{block "content" .}}{{end}}
    <div id="toast-container"></div>
    <script>
        function showToast(message, type = 'success', duration = 3500) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s ease forwards';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }
    </script>
    {{block "scripts" .}}{{end}}
</body>
</html>
